name: 🏥 React Doctor

on: push

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: millionco/react-doctor@aae328cc98686c69751103bf6d35b0472c8b0a10
        with:
          node-version: 24
          fail-on: error
          diff: true
          annotations: true
